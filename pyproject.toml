[tool.black]
line-length = 88
target-version = ["py311"]

# =========================
# Ruff
# =========================
[tool.ruff]
line-length = 88
exclude = ["alembic"]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "N",
    "UP",
    "B",
]

ignore = [
    "B008",
]

# =========================
# MyPy
# =========================
[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
exclude = "alembic/"

[[tool.mypy.overrides]]
module = [
    "app.infrastructure.repositories.sqlalchemy_task_repository",
]
ignore_errors = true

# =========================
# Pytest
# =========================
[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-ra"
pythonpath = ["."]