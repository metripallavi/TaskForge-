[tool.black]
line-length = 88
target-version = ["py310"]

# =========================
# Ruff
# =========================
[tool.ruff]
line-length = 88
exclude = ["alembic", "__pycache__", ".venv"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B"]

ignore = [
    "B008",
    "B904"
]

# =========================
# Pytest
# =========================
[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-ra"
pythonpath = ["."]

# =========================
# MyPy (relaxed)
# =========================
[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true
exclude = "alembic/"