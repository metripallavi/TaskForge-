name: TaskForge CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-lint-build:
    runs-on: ubuntu-latest

    # ✅ IMPORTANT: environment variables for CI
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 🧼 Lint check
      - name: Run Ruff (lint)
        run: |
          ruff check .

      # 🎨 Format check
      - name: Run Black (format check)
        run: |
          black --check .

      # 🧪 Run tests
      - name: Run Pytest
        run: |
          pytest -q --disable-warnings --maxfail=1

      # 🐳 Docker build test
      - name: Build Docker image
        run: |
          docker build -t taskforge-api .