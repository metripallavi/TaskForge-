services:
  db:
    image: postgres:16
    container_name: taskforge-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: taskforge
      POSTGRES_USER: taskforge_user
      POSTGRES_PASSWORD: taskforge_password

    ports:
      - "5434:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskforge_user -d taskforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    container_name: taskforge-migrate
    restart: "no"

    environment:
      DATABASE_URL: postgresql://taskforge_user:taskforge_password@db:5432/taskforge

    depends_on:
      db:
        condition: service_healthy

    command: alembic upgrade head

  api:
    build: .
    container_name: taskforge-api
    restart: unless-stopped

    ports:
      - "8001:8000"

    environment:
      DATABASE_URL: postgresql://taskforge_user:taskforge_password@db:5432/taskforge

    depends_on:
      migrate:
        condition: service_completed_successfully

    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000

volumes:
  postgres_data: